name: Flutter Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4 # تحديث للإصدار 4

      - name: Setup Java
        uses: actions/setup-java@v4 # تحديث للإصدار 4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Give Permissions
        run: chmod +x android/gradlew

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4 # حل المشكلة: التحديث للإصدار 4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
