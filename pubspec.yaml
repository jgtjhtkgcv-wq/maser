name: yj_converter
description: Youssef Jaber MP4 to 3GP Video Converter
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── BLoC ──────────────────────────────────────────────────────────
  flutter_bloc: ^9.0.0
  equatable: ^2.0.5

  # ── Light Compressor — ضغط فيديو أسرع مع دعم التسريع العتادي ──
  light_compressor: ^2.2.0

  # ── اختيار الملفات والصلاحيات ─────────────────────────────────────
  file_picker: ^9.0.0
  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  path: ^1.9.0
  shared_preferences: ^2.2.0

  # ── واجهة المستخدم ─────────────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
